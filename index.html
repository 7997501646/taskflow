<!DOCTYPE html>
<html>

<head>

<title>TaskFlow</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Daily Habit Tracker</h1>

<p>Track your daily habits</p>

<input
type="text"
id="habit"
placeholder="Enter Habit">

<select id="status">

<option>Completed</option>

<option>Pending</option>

</select>

<button onclick="saveHabit()">

Save Habit

</button>

<p id="result"></p>

<hr>

<h2>Today's Progress</h2>

<hr>

<h2>Habit List</h2>

<ul>

<li>Drink Water</li>

<li>Exercise</li>

<li>Read Books</li>

</ul>

<p>Completed Habits : 3</p>

<p>Pending Habits : 2</p>

</div>

<script src="script.js"></script>

</body>

</html>
